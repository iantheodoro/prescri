<!-- WELCOME SCREEN -->
<div id="screen-welcome" class="screen active">
  <div class="bg-grid"></div>
  <div class="welcome-content">
    <div class="logo-badge">RX</div>
    <h1 class="welcome-title">Bem-vindo,<br/><em>Doutor.</em></h1>
    <p class="welcome-sub">Selecione o setor de atendimento</p>

    <div class="sector-grid sector-grid-special" style="max-width:720px;margin-bottom:8px">
      <button class="sector-card sector-card-notas" onclick="openNotas()">
        <div class="sector-icon">📝</div>
        <div class="sector-name">Anotações</div>
        <div class="sector-desc">Notas rápidas · somem em 48h</div>
      </button>
    </div>

    <!-- Setores unificados e distribuídos igualmente -->
    <div class="sector-group-label">Pronto Atendimento</div>
    <div class="sector-grid">
      <button class="sector-card" data-sector="Sala Verde" onclick="selectSector(this)">
        <div class="sector-icon">🩺</div>
        <div class="sector-name">Sala Verde</div>
        <div class="sector-desc">Média complexidade</div>
      </button>

      <button class="sector-card" data-sector="Sala Vermelha" onclick="selectSector(this)">
        <div class="sector-icon">🚨</div>
        <div class="sector-name">Sala Vermelha</div>
        <div class="sector-desc">Emergências críticas</div>
      </button>

      <button class="sector-card sector-card-special" onclick="openPediatria()">
        <div class="sector-icon">👶</div>
        <div class="sector-name">Pediatria</div>
        <div class="sector-desc">Calculadora de doses + prescrições</div>
      </button>

      <button class="sector-card sector-card-special" data-sector="GO" onclick="selectSector(this)">
        <div class="sector-icon">🤰</div>
        <div class="sector-name">GO</div>
        <div class="sector-desc">Ginecologia e Obstetrícia</div>
      </button>

      <button class="sector-card" data-sector="UTI" onclick="selectSector(this)">
        <div class="sector-icon">🫀</div>
        <div class="sector-name">UTI</div>
        <div class="sector-desc">Terapia Intensiva</div>
      </button>

      <button class="sector-card" data-sector="Enfermaria" onclick="selectSector(this)">
        <div class="sector-icon">🛏️</div>
        <div class="sector-name">Enfermaria</div>
        <div class="sector-desc">Cuidados gerais / internação</div>
      </button>

      <button class="sector-card sector-card-special" data-sector="ECG" onclick="selectSector(this)">
        <div class="sector-icon">📈</div>
        <div class="sector-name">ECG</div>
        <div class="sector-desc">Padrões e laudos com imagens</div>
      </button>
    </div>

    <div class="sector-group-label" style="margin-top:28px">Ferramentas Clínicas</div>
    <div class="sector-grid sector-grid-special">
      <button class="sector-card sector-card-special" onclick="openIntubacao()">
        <div class="sector-icon">🫁</div>
        <div class="sector-name">Intubação</div>
        <div class="sector-desc">Doses para IOT por peso</div>
      </button>
      <button class="sector-card sector-card-special" onclick="openSedacao()">
        <div class="sector-icon">💧</div>
        <div class="sector-name">Sedação contínua</div>
        <div class="sector-desc">Infusão bidirecional por peso</div>
      </button>
    </div>
  </div>
</div>
